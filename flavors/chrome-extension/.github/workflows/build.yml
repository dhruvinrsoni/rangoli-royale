name: Build & Test

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run test suite"
        type: boolean
        default: true
      build_type:
        description: "Build type"
        type: choice
        default: production
        options:
          - production
          - development

permissions:
  contents: write

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: |
          npm run lint -- --format json --output-file .lint-results.json || true
          ERRORS=$(node -e "const r=require('./.lint-results.json');console.log(r.reduce((a,f)=>a+f.errorCount,0))")
          WARNINGS=$(node -e "const r=require('./.lint-results.json');console.log(r.reduce((a,f)=>a+f.warningCount,0))")
          npm run lint
          LINT_EXIT=$?
          if [ "$LINT_EXIT" -eq 0 ]; then
            echo "### Lint Passed — ${ERRORS} errors, ${WARNINGS} warnings" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Lint Failed — ${ERRORS} errors, ${WARNINGS} warnings" >> $GITHUB_STEP_SUMMARY
          fi
          exit $LINT_EXIT

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Test
        if: inputs.run_tests != 'false'
        run: npm test

      - name: Production build
        run: npm run build:prod

      - name: Package extension
        run: |
          npm run package
          VERSION=$(node -e "console.log(require('./package.json').version)")
          NAME=$(node -e "console.log(require('./package.json').name)")
          PACKAGE_ZIP=$(ls -t release/*.zip 2>/dev/null | head -n1 || true)
          if [ -z "$PACKAGE_ZIP" ]; then
            echo "Error: no package zip found in release/" >&2
            exit 1
          fi
          ARTIFACT_NAME="${NAME}-v${VERSION}.zip"
          cp "$PACKAGE_ZIP" "./${ARTIFACT_NAME}"
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV
          echo "## Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          ls -lh "${ARTIFACT_NAME}" | awk -v name="${ARTIFACT_NAME}" '{print "| " name " | " $5 " |"}' >> $GITHUB_STEP_SUMMARY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-${{ github.run_number }}
          path: ${{ env.ARTIFACT_NAME }}
          retention-days: 30

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-${{ github.run_number }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
